app = "m-mall-voc-dashboard"
primary_region = "nrt"

[env]
  PORT = "8080"
  CACHE_TTL_SECONDS = "3600"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
